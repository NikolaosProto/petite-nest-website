<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Petite Nest · Μικρολίμανο, Πειραιάς</title>
  <meta name="description" content="Φωτεινό, άνετο διαμέρισμα στο Μικρολίμανο Πειραιά. Minimal & boho αισθητική, μπαλκόνι, δίπλα στη θάλασσα.">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,500&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    /* ─── Reset & base ─────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      background: #F4EFE7;
      color: #232019;
      font-family: 'Manrope', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      overflow-x: hidden;
    }
    a { color: inherit; text-decoration: none; }
    img { display: block; max-width: 100%; }
    button { font-family: inherit; cursor: pointer; }
    ::selection { background: #2E5A52; color: #fff; }

    /* ─── Layout ────────────────────────────────────────────── */
    .container {
      max-width: 1180px;
      margin: 0 auto;
      padding: 0 clamp(20px, 5vw, 40px);
    }

    /* ─── Shared typographic elements ───────────────────────── */
    .label {
      font-size: 12px;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: #2E5A52;
      font-weight: 600;
    }
    h1, h2, h3 { margin: 0; }
    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 500;
      font-size: clamp(40px, 5.6vw, 72px);
      line-height: 1.02;
      letter-spacing: -1px;
      margin-top: 18px;
    }
    h2 {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 500;
      font-size: clamp(30px, 4.2vw, 48px);
      line-height: 1.06;
      letter-spacing: -0.5px;
      margin-top: 14px;
    }
    h3 {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 500;
      font-size: 24px;
      margin: 18px 0 6px;
    }

    /* ─── Header ────────────────────────────────────────────── */
    header {
      position: sticky;
      top: 0;
      z-index: 60;
      background: rgba(244, 239, 231, 0.88);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-bottom: 1px solid #E4DCCE;
    }
    .header-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      height: 70px;
    }
    .logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 23px;
      font-weight: 600;
      letter-spacing: 4px;
      line-height: 1;
      white-space: nowrap;
    }
    .desktop-nav {
      display: flex;
      gap: 30px;
    }
    .desktop-nav a {
      font-size: 13.5px;
      font-weight: 500;
      color: #3C382F;
      letter-spacing: 0.2px;
      transition: color 0.15s;
    }
    .desktop-nav a:hover { color: #2E5A52; }
    .header-actions { display: flex; align-items: center; gap: 12px; }
    .btn-lang {
      background: transparent;
      border: 1px solid #D8CFBE;
      color: #3C382F;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 1px;
      padding: 8px 12px;
      border-radius: 999px;
      transition: background 0.15s;
    }
    .btn-lang:hover { background: #EDE8DF; }
    .btn-cta-nav {
      background: #2E5A52;
      color: #fff;
      font-size: 13.5px;
      font-weight: 600;
      padding: 11px 20px;
      border-radius: 999px;
      transition: background 0.15s;
      white-space: nowrap;
    }
    .btn-cta-nav:hover { background: #244A43; }
    .btn-hamburger {
      background: transparent;
      border: none;
      padding: 8px;
      display: none;
      flex-direction: column;
      gap: 5px;
    }
    .btn-hamburger span {
      display: block;
      width: 22px;
      height: 1.5px;
      background: #232019;
      transition: transform 0.2s, opacity 0.2s;
    }

    /* Mobile nav */
    .mobile-nav {
      display: none;
      flex-direction: column;
      border-top: 1px solid #E4DCCE;
      background: #F4EFE7;
      padding: 8px clamp(20px, 5vw, 40px) 20px;
    }
    .mobile-nav.open { display: flex; }
    .mobile-nav a {
      padding: 14px 0;
      border-bottom: 1px solid #E9E1D2;
      font-size: 16px;
    }
    .mobile-nav .mobile-book {
      margin-top: 16px;
      background: #2E5A52;
      color: #fff;
      text-align: center;
      font-weight: 600;
      padding: 14px;
      border-radius: 999px;
      border: none;
      font-size: 15px;
      font-family: inherit;
    }

    /* ─── Hero ──────────────────────────────────────────────── */
    .hero-section {
      padding: clamp(40px, 6vw, 80px) clamp(20px, 5vw, 40px) 0;
    }
    .hero-grid {
      display: flex;
      flex-wrap: wrap;
      gap: clamp(28px, 5vw, 60px);
      align-items: center;
    }
    .hero-text { flex: 1 1 380px; min-width: 280px; }
    .hero-img  { flex: 1 1 380px; min-width: 280px; }
    .hero-img img {
      width: 100%;
      height: clamp(320px, 52vh, 560px);
      object-fit: cover;
      border-radius: 6px;
    }
    .hero-sub {
      font-size: clamp(16px, 2vw, 18px);
      line-height: 1.7;
      color: #5E5A50;
      max-width: 440px;
      margin: 22px 0 0;
    }
    .hero-badges {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 28px;
    }
    .badge {
      font-size: 13px;
      font-weight: 500;
      color: #3C382F;
      background: #fff;
      border: 1px solid #E4DCCE;
      padding: 8px 14px;
      border-radius: 999px;
    }

    /* ─── Booking bar ───────────────────────────────────────── */
    .booking-bar {
      margin-top: clamp(32px, 5vw, 56px);
      background: #fff;
      border: 1px solid #E4DCCE;
      border-radius: 10px;
      box-shadow: 0 24px 60px -34px rgba(35, 32, 25, 0.45);
      display: flex;
      flex-wrap: wrap;
      align-items: stretch;
      overflow: hidden;
    }
    .bar-seg {
      flex: 1 1 130px;
      min-width: 110px;
      padding: 16px 22px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      justify-content: center;
      border-right: 1px solid #ECE5D8;
    }
    .bar-seg.clickable {
      transition: background 0.15s;
      text-decoration: none;
      color: inherit;
    }
    .bar-seg.clickable:hover { background: #FBF7F1; }
    .bar-seg-lbl {
      font-size: 11px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: #8C8678;
    }
    .bar-price { font-size: 16px; font-weight: 700; }
    .bar-price-sub { font-weight: 500; font-size: 13px; color: #8C8678; }
    .bar-val { font-size: 15px; font-weight: 600; }
    .bar-cta {
      flex: 1 1 190px;
      min-width: 160px;
      background: #2E5A52;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 18px 22px;
      font-weight: 600;
      font-size: 15px;
      transition: background 0.15s;
      text-decoration: none;
    }
    .bar-cta:hover { background: #244A43; }

    /* ─── Sections ──────────────────────────────────────────── */
    .section {
      padding: clamp(64px, 9vw, 120px) clamp(20px, 5vw, 40px);
    }
    .section.bg-warm {
      background: #FBF7F1;
      border-top: 1px solid #ECE3D5;
      border-bottom: 1px solid #ECE3D5;
    }
    [id] { scroll-margin-top: 80px; }

    /* ─── About ─────────────────────────────────────────────── */
    .about-grid {
      display: flex;
      flex-wrap: wrap;
      gap: clamp(32px, 5vw, 64px);
      align-items: center;
    }
    .about-img { flex: 1 1 380px; min-width: 280px; }
    .about-img img {
      width: 100%;
      height: clamp(360px, 50vh, 520px);
      object-fit: cover;
      border-radius: 6px;
    }
    .about-text { flex: 1 1 380px; min-width: 280px; }
    .about-body {
      font-size: 16.5px;
      line-height: 1.75;
      color: #5E5A50;
      margin: 22px 0 0;
    }
    .about-body + .about-body { margin-top: 18px; }
    .about-host {
      margin-top: 26px;
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 20px;
      color: #2E5A52;
    }

    /* ─── Amenities ─────────────────────────────────────────── */
    .amenities-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      column-gap: 36px;
      margin-top: 36px;
    }
    .amenity {
      display: flex;
      gap: 14px;
      align-items: center;
      padding: 20px 0;
      border-top: 1px solid #E4DCCE;
    }
    .amenity span { font-size: 15px; font-weight: 500; }

    /* ─── Gallery ───────────────────────────────────────────── */
    .gallery-header {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: flex-end;
      gap: 16px;
      margin-bottom: 28px;
    }
    .gallery-caption { font-size: 14px; color: #8C8678; }
    .slider-outer {
      position: relative;
      border-radius: 8px;
      overflow: hidden;
      background: #EFEAE1;
      border: 1px solid #E4DCCE;
    }
    .slider-viewport {
      overflow: hidden;
      width: 100%;
      height: clamp(300px, 58vh, 620px);
    }
    .slider-track {
      display: flex;
      height: 100%;
      transition: transform 0.55s cubic-bezier(0.4, 0, 0.2, 1);
      will-change: transform;
    }
    .slide { flex: 0 0 100%; height: 100%; }
    .slide img { width: 100%; height: 100%; object-fit: cover; }
    .slider-arrow {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 46px;
      height: 46px;
      border-radius: 999px;
      border: none;
      background: rgba(255, 255, 255, 0.92);
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.18);
      font-size: 22px;
      color: #232019;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
    }
    .slider-arrow:hover { background: #fff; }
    .arrow-prev { left: 14px; }
    .arrow-next { right: 14px; }
    .slide-counter {
      position: absolute;
      right: 16px;
      bottom: 16px;
      background: rgba(35, 32, 25, 0.72);
      color: #fff;
      font-size: 12.5px;
      font-weight: 600;
      letter-spacing: 0.5px;
      padding: 6px 12px;
      border-radius: 999px;
      backdrop-filter: blur(4px);
      pointer-events: none;
    }
    .slider-dots {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-top: 20px;
    }
    .dot {
      height: 8px;
      width: 8px;
      border-radius: 999px;
      border: none;
      background: #D8CFBE;
      padding: 0;
      transition: width 0.3s, background 0.3s;
    }
    .dot.active { width: 26px; background: #2E5A52; }

    /* ─── Spaces ─────────────────────────────────────────────── */
    .spaces-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 26px;
      margin-top: 36px;
    }
    .space-card img {
      width: 100%;
      height: 220px;
      object-fit: cover;
      border-radius: 6px;
    }
    .space-card p { font-size: 15px; line-height: 1.65; color: #5E5A50; margin: 0; }

    /* ─── Location ──────────────────────────────────────────── */
    .location-grid {
      display: flex;
      flex-wrap: wrap;
      gap: clamp(32px, 5vw, 64px);
      align-items: center;
    }
    .location-text { flex: 1 1 360px; min-width: 280px; }
    .location-map  { flex: 1 1 360px; min-width: 280px; }
    .location-map iframe {
      width: 100%;
      height: clamp(300px, 46vh, 440px);
      border: none;
      border-radius: 6px;
      display: block;
    }
    .location-body {
      font-size: 16.5px;
      line-height: 1.75;
      color: #5E5A50;
      margin: 20px 0 28px;
      max-width: 440px;
    }
    .nearby-list { display: flex; flex-direction: column; }
    .nearby-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 0;
      border-top: 1px solid #E4DCCE;
    }
    .nearby-place { font-size: 15px; font-weight: 500; }
    .nearby-dist  { font-size: 14px; color: #8C8678; }

    /* ─── Reviews ───────────────────────────────────────────── */
    .reviews-header {
      display: flex;
      flex-wrap: wrap;
      align-items: baseline;
      gap: 16px;
      margin-bottom: 40px;
    }
    .review-score {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(48px, 7vw, 72px);
      font-weight: 500;
      line-height: 1;
      color: #2E5A52;
    }
    .stars     { color: #2E5A52; font-size: 18px; letter-spacing: 3px; }
    .stars-sm  { color: #2E5A52; font-size: 14px; letter-spacing: 2px; margin-bottom: 14px; }
    .review-count { font-size: 14px; color: #8C8678; margin-top: 4px; }
    /* ─── Reviews Grid ───────────────────────────────────────── */
    .rev-carousel-outer { overflow: hidden; }
    .rev-carousel-track {
      display: flex;
      transition: transform 0.55s cubic-bezier(0.4, 0, 0.2, 1);
      will-change: transform;
    }
    .rev-carousel-page {
      flex: 0 0 100%;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 24px;
    }
    @media (max-width: 960px) {
      .rev-carousel-page { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 600px) {
      .rev-carousel-page { grid-template-columns: 1fr; }
    }
    .rev-carousel-dots {
      display: flex;
      gap: 8px;
      justify-content: center;
      margin-top: 24px;
      margin-bottom: 8px;
    }
    .rev-car-dot {
      height: 8px; width: 8px;
      border-radius: 999px;
      border: none;
      background: #D8CFBE;
      padding: 0;
      cursor: pointer;
      transition: width 0.3s, background 0.3s;
    }
    .rev-car-dot.active { width: 26px; background: #2E5A52; }
    .rev-card {
      background: #fff;
      border: 1px solid #E4DCCE;
      border-radius: 8px;
      padding: 28px;
      display: flex;
      flex-direction: column;
    }
    .rev-body {
      font-family: 'Cormorant Garamond', serif;
      font-size: 19px;
      line-height: 1.5;
      color: #2C2820;
      margin: 0 0 14px;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .rev-body.expanded {
      display: block;
      overflow: visible;
    }
    .read-more-btn {
      background: none;
      border: none;
      padding: 0;
      font-family: 'Manrope', sans-serif;
      font-size: 13px;
      font-weight: 600;
      color: #2E5A52;
      cursor: pointer;
      text-decoration: underline;
      text-underline-offset: 3px;
      margin-bottom: 18px;
      text-align: left;
    }
    .read-more-btn:hover { color: #244A43; }
    .rev-footer { margin-top: auto; }
    .rev-name { font-size: 14px; font-weight: 600; }
    .rev-meta { font-size: 13px; color: #8C8678; margin-top: 2px; }
    .airbnb-link-wrap {
      text-align: center;
      margin-top: 8px;
    }
    .airbnb-link {
      font-size: 14px;
      font-weight: 600;
      color: #2E5A52;
      text-decoration: underline;
      text-underline-offset: 3px;
    }
    .airbnb-link:hover { color: #244A43; }
    .review-card {
      background: #fff;
      border: 1px solid #E4DCCE;
      border-radius: 8px;
      padding: 28px;
    }
    .review-quote {
      font-family: 'Cormorant Garamond', serif;
      font-size: 21px;
      line-height: 1.45;
      color: #2C2820;
      margin: 0 0 20px;
    }
    .review-name { font-size: 14px; font-weight: 600; }
    .review-meta { font-size: 13px; color: #8C8678; margin-top: 2px; }

    /* ─── Booking ───────────────────────────────────────────── */
    .booking-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 24px;
      align-items: flex-start;
    }

    /* Calendar */
    .calendar-card {
      flex: 1 1 340px;
      min-width: 290px;
      background: #fff;
      border: 1px solid #E4DCCE;
      border-radius: 12px;
      padding: clamp(20px, 3vw, 30px);
    }
    .cal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 18px;
    }
    .cal-month {
      font-family: 'Cormorant Garamond', serif;
      font-size: 24px;
      font-weight: 500;
    }
    .cal-nav {
      width: 38px;
      height: 38px;
      border: 1px solid #E4DCCE;
      background: #fff;
      border-radius: 999px;
      font-size: 16px;
      color: #3C382F;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, border-color 0.15s;
    }
    .cal-nav:hover { background: #F4EFE7; border-color: #CFC6B4; }
    .cal-weekdays {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      margin-bottom: 6px;
    }
    .cal-wd {
      text-align: center;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.5px;
      color: #A39C8C;
      padding: 6px 0;
    }
    .cal-days { display: grid; grid-template-columns: repeat(7, 1fr); }
    .cal-day {
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .cal-day-inner {
      width: 38px;
      height: 38px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      font-size: 14px;
      font-weight: 500;
      color: #3C382F;
    }
    .cal-day.available { cursor: pointer; }
    .cal-day.available:hover .cal-day-inner { background: #F4EFE7; }
    .cal-day.past .cal-day-inner { color: #CFC8BA; }
    .cal-day.in-range { background: #E7E0D2; }
    .cal-day.range-start { background: linear-gradient(to right, transparent 50%, #E7E0D2 50%); }
    .cal-day.range-end   { background: linear-gradient(to right, #E7E0D2 50%, transparent 50%); }
    .cal-day.selected .cal-day-inner,
    .cal-day.range-end .cal-day-inner {
      background: #2E5A52;
      color: #fff;
      font-weight: 600;
    }
    .cal-day.available.selected:hover .cal-day-inner,
    .cal-day.available.range-end:hover .cal-day-inner { background: #244A43; }
    .min-stay-note {
      margin-top: 16px;
      font-size: 12.5px;
      color: #A39C8C;
    }

    /* Summary card */
    .summary-card {
      flex: 1 1 310px;
      min-width: 280px;
      background: #fff;
      border: 1px solid #E4DCCE;
      border-radius: 12px;
      padding: clamp(22px, 3vw, 30px);
      box-shadow: 0 24px 60px -40px rgba(35, 32, 25, 0.45);
    }
    .summary-rate {
      display: flex;
      align-items: baseline;
      gap: 6px;
      margin-bottom: 22px;
    }
    .summary-price { font-size: 26px; font-weight: 700; }
    .summary-night { font-size: 14px; color: #8C8678; }

    .dates-box {
      border: 1px solid #E4DCCE;
      border-radius: 10px;
      overflow: hidden;
      margin-bottom: 18px;
    }
    .dates-row { display: flex; }
    .date-cell {
      flex: 1;
      padding: 12px 16px;
      border-right: 1px solid #ECE5D8;
    }
    .date-cell:last-child { border-right: none; }
    .date-cell-lbl {
      font-size: 10.5px;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      color: #A39C8C;
    }
    .date-cell-val { font-size: 14.5px; font-weight: 600; margin-top: 3px; }

    .guests-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      border-top: 1px solid #ECE5D8;
    }
    .guests-ctrl { display: flex; align-items: center; gap: 14px; }
    .guests-btn {
      width: 32px;
      height: 32px;
      border: 1px solid #D8CFBE;
      background: #fff;
      border-radius: 999px;
      font-size: 18px;
      line-height: 1;
      color: #3C382F;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
    }
    .guests-btn:hover { background: #F4EFE7; }
    .guests-n { font-size: 16px; font-weight: 600; min-width: 16px; text-align: center; }

    .price-breakdown {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 18px;
    }
    .price-row {
      display: flex;
      justify-content: space-between;
      font-size: 14.5px;
      color: #5E5A50;
    }
    .price-total {
      display: flex;
      justify-content: space-between;
      font-size: 17px;
      font-weight: 700;

function updateGallery() {

  document.getElementById('slideCounter').textContent = `${cur + 1} / ${n}`;
  document.querySelectorAll('#sliderDots .dot').forEach((d, i) =>
    d.classList.toggle('active', i === cur)
  );
}

});

let tx0 = null;
const vp = document.querySelector('.slider-viewport');
vp.addEventListener('touchstart', e => { tx0 = e.touches[0].clientX; }, { passive: true });
vp.addEventListener('touchend',   e => {
  if (tx0 === null) return;
  const dx = e.changedTouches[0].clientX - tx0;
  if (Math.abs(dx) > 40) {
    S.slide = dx > 0
      ? (S.slide - 1 + PHOTOS.length) % PHOTOS.length
      : (S.slide + 1) % PHOTOS.length;
    updateGallery();
  }
  tx0 = null;
});

// ── CALENDAR ─────────────────────────────────────────────────
function initCalendar() {
  const now = new Date();
  S.monthStart = new Date(now.getFullYear(), now.getMonth(), 1);
}

function renderCalendar() {
  const tr = t();
  const ms = S.monthStart;
  if (!ms) return;

  document.getElementById('calMonth').textContent =
    `${tr.months[ms.getMonth()]} ${ms.getFullYear()}`;

  document.getElementById('calWeekdays').innerHTML =
    tr.weekdays.map(d => `<div class="cal-wd">${d}</div>`).join('');

  const today       = mid(new Date());
  const { checkIn, checkOut } = S;
  const startOffset = (ms.getDay() + 6) % 7; // Mon = 0
  const gridStart   = addDays(ms, -startOffset);

  const frag = document.createDocumentFragment();
  for (let i = 0; i < 42; i++) {
    const date    = addDays(gridStart, i);
    const inMonth = date.getMonth() === ms.getMonth();
    const isPast  = mid(date) < today;
    const isCI    = checkIn  && sameDay(date, checkIn);
    const isCO    = checkOut && sameDay(date, checkOut);
    const inRange = checkIn && checkOut
      && mid(date) > mid(checkIn) && mid(date) < mid(checkOut);

    const cell = document.createElement('div');
    cell.className = 'cal-day';

    if (inMonth) {
      if (isPast) {
        cell.classList.add('past');
      } else {
        cell.classList.add('available');
        if (isCI && checkOut) cell.classList.add('range-start');
        if (isCO)             cell.classList.add('range-end');
        if (inRange)          cell.classList.add('in-range');
        if (isCI)             cell.classList.add('selected');

        const d = new Date(date);
        cell.addEventListener('click', () => pickDay(d));
      }
    }

    const inner = document.createElement('div');
    inner.className = 'cal-day-inner';
    inner.textContent = inMonth ? date.getDate() : '';
    cell.appendChild(inner);
    frag.appendChild(cell);
  }

  const grid = document.getElementById('calDays');
  grid.innerHTML = '';
  grid.appendChild(frag);
}

function pickDay(date) {
  const d = mid(date);
  const { checkIn, checkOut } = S;
  if (!checkIn || (checkIn && checkOut)) {
    S.checkIn  = d;
    S.checkOut = null;
  } else if (d <= mid(checkIn)) {
    S.checkIn  = d;
    S.checkOut = null;
  } else {
    S.checkOut = d;
  }
  S.sent = false;
  renderCalendar();
  updateSummary();
  updateBarDates();
}

document.getElementById('prevMonth').addEventListener('click', () => {
  const now  = new Date();
  const cur  = new Date(now.getFullYear(), now.getMonth(), 1);
  const prev = new Date(S.monthStart.getFullYear(), S.monthStart.getMonth() - 1, 1);
  if (prev >= cur) { S.monthStart = prev; renderCalendar(); }
});
document.getElementById('nextMonth').addEventListener('click', () => {
  S.monthStart = new Date(S.monthStart.getFullYear(), S.monthStart.getMonth() + 1, 1);
  renderCalendar();
});

  const { checkIn, checkOut, sent } = S;
  const hasDates = !!(checkIn && checkOut);
  const nights   = hasDates ? diffDays(checkIn, checkOut) : 0;
  const subtotal = nights * RATE;
  const service  = Math.round(subtotal * SVC);
  const total    = hasDates ? subtotal + CLEAN + service : 0;

  document.getElementById('sumCheckIn').textContent  = fmtD(checkIn)  || '—';
  document.getElementById('sumCheckOut').textContent = fmtD(checkOut) || '—';

  const priceBlock = document.getElementById('priceBlock');
  const noDatesMsg = document.getElementById('noDatesMsg');
  const bookBtn    = document.getElementById('bookBtn');

  if (hasDates) {
    priceBlock.style.display = 'block';
    noDatesMsg.style.display = 'none';
    document.getElementById('rateLine').textContent  = `€${RATE} × ${nights} ${tr.nightWord(nights)}`;
    document.getElementById('rateAmt').textContent   = `€${subtotal}`;
    document.getElementById('serviceAmt').textContent= `€${service}`;
    document.getElementById('totalAmt').textContent  = `€${total}`;
    bookBtn.textContent = sent ? tr.book.sent : tr.book.requestReady;
    bookBtn.className   = sent ? 'book-btn sent' : 'book-btn ready';
  } else {
    priceBlock.style.display = 'none';
    noDatesMsg.style.display = 'block';
    bookBtn.textContent = tr.book.requestEmpty;
    bookBtn.className   = 'book-btn empty';
  }
}

function updateBarDates() {
  const tr = t();
  const { checkIn, checkOut } = S;
  let label;
  if (checkIn && checkOut)  label = `${fmtD(checkIn)} – ${fmtD(checkOut)}`;
  else if (checkIn)          label = `${fmtD(checkIn)} – …`;
  else                       label = tr.widget.add;
  document.getElementById('barDates').textContent = label;
}

// ── BOOK BUTTON ──────────────────────────────────────────────
document.getElementById('bookBtn').addEventListener('click', () => {
  if (!(S.checkIn && S.checkOut)) return;
  S.sent = true;
  updateSummary();
  clearTimeout(S.sentTimer);
  S.sentTimer = setTimeout(() => { S.sent = false; updateSummary(); }, 2600);
});

// ── REVIEWS CAROUSEL ─────────────────────────────────────────
const RV = {
  cur: 0, total: 0, timer: null, INTERVAL: 7000,
  go(i) {
    const n = RV.total;
    RV.cur = ((i % n) + n) % n;
    document.getElementById('revTrack').style.transform = `translateX(-${RV.cur * 100}%)`;
    document.querySelectorAll('.rev-car-dot').forEach((d, j) =>
      d.classList.toggle('active', j === RV.cur)
    );
  },
  next()    { RV.go(RV.cur + 1); },
  startAuto() { clearInterval(RV.timer); RV.timer = setInterval(RV.next, RV.INTERVAL); },
  restart()   { clearInterval(RV.timer); RV.startAuto(); },
};

function buildReviews() {
  const CHUNK = 3;
  const pages = [];
  for (let i = 0; i < REVIEWS.length; i += CHUNK) pages.push(REVIEWS.slice(i, i + CHUNK));

  document.getElementById('revTrack').innerHTML = pages.map((page, pi) =>
    `<div class="rev-carousel-page">${
      page.map((r, ri) => {
        const idx = pi * CHUNK + ri;
        return `<div class="rev-card">
          <div class="stars-sm">★★★★★</div>
          <p class="rev-body" id="revBody${idx}">"${r.quote}"</p>
          <button class="read-more-btn" id="revBtn${idx}" onclick="toggleReview(${idx})">Read more</button>
          <div class="rev-footer">
            <div class="rev-name">${r.name}</div>
            <div class="rev-meta">${r.meta}</div>
          </div>
        </div>`;
      }).join('')
    }</div>`
  ).join('');

  document.getElementById('revCarDots').innerHTML = pages.map((_, i) =>
    `<button class="rev-car-dot${i === 0 ? ' active' : ''}" data-i="${i}" aria-label="Page ${i+1}"></button>`
  ).join('');

  document.querySelectorAll('.rev-car-dot').forEach(btn =>
    btn.addEventListener('click', () => { RV.go(+btn.dataset.i); RV.restart(); })
  );

  RV.total = pages.length;
  RV.startAuto();
}

function toggleReview(i) {
  const body = document.getElementById('revBody' + i);
  const btn  = document.getElementById('revBtn' + i);
  const expanded = body.classList.toggle('expanded');
  btn.textContent = expanded ? 'Read less' : 'Read more';
}

// ── LIGHTBOX ─────────────────────────────────────────────────
const LB = {
  cur: 0,
  open(i) {
    LB.cur = ((i % PHOTOS.length) + PHOTOS.length) % PHOTOS.length;
    LB._show();
    document.getElementById('lbOverlay').classList.add('open');
    document.body.style.overflow = 'hidden';
  },
  close() {
    document.getElementById('lbOverlay').classList.remove('open');
    document.body.style.overflow = '';
  },
  prev() { LB.cur = (LB.cur - 1 + PHOTOS.length) % PHOTOS.length; LB._show(); },
  next() { LB.cur = (LB.cur + 1) % PHOTOS.length; LB._show(); },
  _show() {
    document.getElementById('lbImg').src = PHOTOS[LB.cur];
    document.getElementById('lbCounter').textContent = `${LB.cur + 1} / ${PHOTOS.length}`;
  },
};

document.getElementById('lbClose').addEventListener('click', LB.close);
document.getElementById('lbPrev').addEventListener('click', LB.prev);
document.getElementById('lbNext').addEventListener('click', LB.next);
document.getElementById('lbOverlay').addEventListener('click', e => {
  if (e.target === e.currentTarget || e.target.id === 'lbImgWrap') LB.close();
});

document.addEventListener('keydown', e => {
  if (!document.getElementById('lbOverlay').classList.contains('open')) return;
  if (e.key === 'Escape')     LB.close();
  if (e.key === 'ArrowLeft')  LB.prev();
  if (e.key === 'ArrowRight') LB.next();
});

document.getElementById('lbOverlay').addEventListener('wheel', e => {
  e.preventDefault();
  e.deltaY > 0 ? LB.next() : LB.prev();
}, { passive: false });

let lbTx = null;
document.getElementById('lbOverlay').addEventListener('touchstart', e => {
  lbTx = e.touches[0].clientX;
}, { passive: true });
document.getElementById('lbOverlay').addEventListener('touchend', e => {
  if (lbTx === null) return;
  const dx = e.changedTouches[0].clientX - lbTx;
  if (Math.abs(dx) > 40) { dx > 0 ? LB.prev() : LB.next(); }
  lbTx = null;
});

// ── INIT ─────────────────────────────────────────────────────
buildGallery();
buildReviews();
initCalendar();
applyTr();
</script>
